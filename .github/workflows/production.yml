name: Matrix Factory & GSC Tools

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 */2 * * *'  # Run every 2 hours
  workflow_dispatch:
    inputs:
      task_to_run:
        description: 'Which task to run?'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - gsc_miner

permissions:
  contents: write

jobs:
  produce-assets:
    name: "Run Full Production Pipeline"
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.task_to_run == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev libssl-dev libffi-dev libjpeg-dev zlib1g-dev libpangocairo-1.0-0
          
          # Debug: Check file structure
          echo "Current directory: $(pwd)"
          ls -R
          
          # Handle directory structure - ROBUST FIND MODE
          TARGET_FILE="test_config.py"
          echo "Searching for $TARGET_FILE..."
          FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
          
          if [ -z "$FOUND_PATH" ]; then
            echo "CRITICAL ERROR: $TARGET_FILE not found anywhere!"
            exit 1
          fi
          
          echo "Found $TARGET_FILE at: $FOUND_PATH"
          WORKING_DIR=$(dirname "$FOUND_PATH")
          echo "Detected working directory: $WORKING_DIR"
          
          # Enter directory
          cd "$WORKING_DIR"
          
          # Install requirements
          pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "Warning: requirements.txt not found in $WORKING_DIR"
          fi
          pip install xhtml2pdf
          playwright install chromium
          
          # Export for subsequent steps - need absolute path or relative to root?
          # Github Actions env vars persist between steps but reset cwd.
          # We will store the relative path to the root.
          echo "WORKING_DIR=$WORKING_DIR" >> $GITHUB_ENV

      - name: Test Configuration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: |
          cd ${{ env.WORKING_DIR }}
          python test_config.py

      - name: Phase 1 Matrix Scout (Mine Keywords)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          cd ${{ env.WORKING_DIR }}
          python matrix_scout.py --limit 10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-assets
          path: .

  refine-and-deploy:
    name: "Refine, Deploy, and Commit"
    needs: produce-assets
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-assets
          path: .
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev libssl-dev libffi-dev libjpeg-dev zlib1g-dev libpangocairo-1.0-0
          
          # Debug: Check file structure after download
          echo "Current directory: $(pwd)"
          ls -R

          # Handle directory structure - ROBUST FIND MODE
          TARGET_FILE="test_config.py"
          echo "Searching for $TARGET_FILE..."
          FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
          
          if [ -z "$FOUND_PATH" ]; then
            echo "CRITICAL ERROR: $TARGET_FILE not found anywhere!"
            exit 1
          fi
          
          echo "Found $TARGET_FILE at: $FOUND_PATH"
          WORKING_DIR=$(dirname "$FOUND_PATH")
          echo "Detected working directory: $WORKING_DIR"
          
          # Enter directory
          cd "$WORKING_DIR"
          
          # Install requirements
          pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "Warning: requirements.txt not found in $WORKING_DIR"
          fi
          pip install xhtml2pdf
          playwright install chromium
          
          # Export for subsequent steps
          echo "WORKING_DIR=$WORKING_DIR" >> $GITHUB_ENV

      - name: Phase 3 Matrix Refiner
        timeout-minutes: 60
        run: |
          cd ${{ env.WORKING_DIR }}
          python matrix_refiner.py --batch 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Phase 4 Matrix Composer
        run: |
          cd ${{ env.WORKING_DIR }}
          python matrix_composer.py --batch 50
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Phase 5 Matrix Reporter
        run: |
          cd ${{ env.WORKING_DIR }}
          python matrix_reporter.py --batch 50
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Setup Git Identity
        run: |
          git config --global user.name "Matrix Factory Bot"
          git config --global user.email "bot@soeasyhub.com"

      - name: Phase 6 Matrix Deployer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd ${{ env.WORKING_DIR }}
          python matrix_deployer.py

      - name: Commit and Push Changes (Robust Version)
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-update: Assets & Sitemap [skip ci]"
          git pull --rebase origin master
          git push origin HEAD:master

  deploy-worker:
    name: "Deploy Cloudflare Worker"
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.task_to_run == 'production'
    runs-on: ubuntu-latest
    needs: refine-and-deploy
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Secrets to Worker
        run: |
          echo "${{ secrets.SUPABASE_URL }}" | npx wrangler secret put SUPABASE_URL || true
          echo "${{ secrets.SUPABASE_KEY }}" | npx wrangler secret put SUPABASE_KEY || true
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  run-gsc-miner:
    name: "Run GSC Keyword Miner (Manual)"
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.task_to_run == 'gsc_miner'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev pkg-config python3-dev libssl-dev libffi-dev libjpeg-dev zlib1g-dev libpangocairo-1.0-0
          python -m pip install --upgrade pip
          
          # Debug: Check file structure
          echo "Current directory: $(pwd)"
          ls -R

          # Handle directory structure - ROBUST FIND MODE
          TARGET_FILE="gsc_miner.py"
          echo "Searching for $TARGET_FILE..."
          FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
          
          if [ -z "$FOUND_PATH" ]; then
            echo "CRITICAL ERROR: $TARGET_FILE not found anywhere!"
            exit 1
          fi
          
          echo "Found $TARGET_FILE at: $FOUND_PATH"
          WORKING_DIR=$(dirname "$FOUND_PATH")
          echo "Detected working directory: $WORKING_DIR"
          
          # Enter directory
          cd "$WORKING_DIR"
          
          # Install requirements
          pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
             echo "Warning: requirements.txt not found in $WORKING_DIR"
          fi
          pip install pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib
          
          # Export for subsequent steps
          echo "WORKING_DIR=$WORKING_DIR" >> $GITHUB_ENV
      
      - name: Run GSC Miner Script
        run: |
          cd ${{ env.WORKING_DIR }}
          python -c "import os; open('./gsc_key.json', 'w', encoding='utf-8').write(os.environ['GSC_CREDENTIALS'])"
          python gsc_miner.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GSC_CREDENTIALS: ${{ secrets.GOOGLE_SEO_JSON }}
          GSC_KEY_FILE: ./gsc_key.json
